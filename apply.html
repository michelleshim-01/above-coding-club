<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워크샵 신청 | Above Coding Club</title>
  <meta name="description" content="Above Coding Club 워크샵 참가 신청">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a href="./" class="logo">Above <span>Coding Club</span></a>
      <a href="./" class="btn btn--outline" style="padding: 0.5rem 1rem; font-size: 0.875rem;">홈으로</a>
    </div>
  </header>

  <!-- Apply Hero -->
  <section class="apply-hero">
    <div class="container">
      <h1>워크샵 신청</h1>
      <p>4월 5일 (일) 오후 2시 | 참가비 <s>100,000원</s> 50,000원 | 최대 15명</p>
    </div>
  </section>

  <!-- Form Section -->
  <section class="form-section">
    <div class="container container--narrow">
      <form class="apply-form" id="applyForm">

        <!-- Success/Error Message -->
        <div id="formMessage" class="form-message" style="display: none;"></div>

        <!-- 이름 -->
        <div class="form-group">
          <label class="form-label" for="name">
            이름 <span class="required">*</span>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-input"
            required
            placeholder="홍길동"
          >
        </div>

        <!-- 이메일 -->
        <div class="form-group">
          <label class="form-label" for="email">
            이메일 <span class="required">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            required
            placeholder="email@example.com"
          >
          <span class="form-hint">워크샵 안내 메일을 보내드려요</span>
        </div>

        <!-- 전화번호 -->
        <div class="form-group">
          <label class="form-label" for="phone">
            전화번호 <span class="required">*</span>
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            class="form-input"
            required
            placeholder="010-1234-5678"
          >
        </div>

        <!-- 맥북 정보 -->
        <div class="form-group">
          <label class="form-label" for="macbook">
            맥북 모델/연도 <span class="required">*</span>
          </label>
          <input
            type="text"
            id="macbook"
            name="macbook"
            class="form-input"
            required
            placeholder="예: MacBook Air M2 (2023)"
          >
          <span class="form-hint">2020년 이후 모델만 참여 가능해요</span>
        </div>

        <!-- 현재 하는 일 -->
        <div class="form-group">
          <label class="form-label" for="job">
            현재 하는 일 <span class="required">*</span>
          </label>
          <input
            type="text"
            id="job"
            name="job"
            class="form-input"
            required
            placeholder="예: 스타트업 PM / 프리랜서 디자이너"
          >
        </div>

        <!-- 만들고 싶은 것 -->
        <div class="form-group">
          <label class="form-label" for="goal">
            워크샵에서 만들고 싶은 것 <span class="required">*</span>
          </label>
          <textarea
            id="goal"
            name="goal"
            class="form-textarea"
            required
            placeholder="예: 회의록을 자동으로 정리하는 도구, 이메일 초안을 작성해주는 스킬 등"
          ></textarea>
          <span class="form-hint">구체적이지 않아도 괜찮아요. 막연한 아이디어도 좋습니다!</span>
        </div>

        <!-- 참가 동기 (선택) -->
        <div class="form-group">
          <label class="form-label" for="motivation">
            참가 동기 <span class="text-muted">(선택)</span>
          </label>
          <textarea
            id="motivation"
            name="motivation"
            class="form-textarea"
            placeholder="이 워크샵에 참여하고 싶은 이유가 있다면 자유롭게 적어주세요"
          ></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn--primary btn--large form-submit" id="submitBtn">
          신청하기
        </button>

      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>Above Coding Club &copy; 2025</p>
    </div>
  </footer>

  <script>
    // ============================================
    // Form Submission via Serverless Function
    // ============================================

    const form = document.getElementById('applyForm');
    const submitBtn = document.getElementById('submitBtn');
    const formMessage = document.getElementById('formMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // 버튼 로딩 상태
      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';
      form.classList.add('form-loading');
      formMessage.style.display = 'none';

      // 폼 데이터 수집
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        macbook: document.getElementById('macbook').value,
        job: document.getElementById('job').value,
        goal: document.getElementById('goal').value,
        motivation: document.getElementById('motivation').value || ''
      };

      try {
        const response = await fetch('/api/apply', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showMessage('success', '신청이 완료되었습니다! 확인 메일을 보내드릴게요.');
          form.reset();
        } else {
          throw new Error(result.error || '제출 중 오류가 발생했습니다');
        }
      } catch (error) {
        console.error('Submit error:', error);
        showMessage('error', error.message || '제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '신청하기';
        form.classList.remove('form-loading');
      }
    });

    function showMessage(type, text) {
      formMessage.className = `form-message form-message--${type}`;
      formMessage.textContent = text;
      formMessage.style.display = 'block';
      formMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 전화번호 자동 포맷팅
    document.getElementById('phone').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 3 && value.length <= 7) {
        value = value.slice(0, 3) + '-' + value.slice(3);
      } else if (value.length > 7) {
        value = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
      }
      e.target.value = value;
    });
  </script>

</body>
</html>
