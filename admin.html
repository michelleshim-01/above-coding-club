<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Above Coding Club - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BioRhyme:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #1a1a1a;
      min-height: 100vh;
      background: #f0ebe5;
      background-image:
        radial-gradient(ellipse 120% 80% at 80% 0%, rgba(255, 180, 150, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 0% 100%, rgba(180, 190, 230, 0.2) 0%, transparent 50%);
    }

    /* Gate */
    .gate {
      position: fixed; inset: 0;
      background: rgba(240, 235, 229, 0.97);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
    }
    .gate.hidden { display: none; }
    .gate-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      padding: 40px; width: 340px; text-align: center;
    }
    .gate-card h2 { font-family: 'BioRhyme', serif; font-size: 20px; font-weight: 400; margin-bottom: 6px; }
    .gate-card p { font-size: 12px; color: #888; margin-bottom: 20px; }
    .gate-input {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-family: inherit; font-size: 13px;
      text-align: center; margin-bottom: 12px; outline: none;
    }
    .gate-input:focus { border-color: #f05a28; }
    .gate-btn {
      width: 100%; padding: 10px; border: none; background: #2d3a4a;
      color: #fff; border-radius: 8px; font-family: inherit;
      font-size: 13px; cursor: pointer;
    }
    .gate-btn:hover { background: #1a2533; }
    .gate-error { color: #e53e3e; font-size: 12px; margin-top: 10px; display: none; }

    /* Layout */
    .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-title { font-family: 'BioRhyme', serif; font-size: 18px; }
    .header-title small { display: block; font-size: 11px; color: #888; font-family: 'IBM Plex Mono', monospace; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 2px solid #e5e0da;
    }
    .tab {
      padding: 10px 20px; font-family: inherit; font-size: 13px;
      background: none; border: none; color: #888; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      font-weight: 500;
    }
    .tab:hover { color: #555; }
    .tab.active { color: #f05a28; border-bottom-color: #f05a28; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Controls */
    .controls {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .controls label { font-size: 12px; color: #888; font-weight: 500; }
    .controls select, .controls input[type="date"] {
      padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-family: inherit; font-size: 13px; background: #fff;
    }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .stat-value { font-family: 'BioRhyme', serif; font-size: 32px; }
    .stat-sub { font-size: 11px; color: #aaa; margin-top: 4px; }

    /* Table */
    .table-wrap {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden;
    }
    .search-bar { padding: 14px; border-bottom: 1px solid #f0f0f0; }
    .search-input {
      width: 100%; padding: 8px 12px; border: 1px solid #eee;
      border-radius: 6px; font-family: inherit; font-size: 12px; outline: none;
    }
    .search-input:focus { border-color: #f05a28; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      text-align: left; padding: 10px 14px; background: #fafafa;
      color: #888; font-weight: 500; font-size: 11px; white-space: nowrap;
      border-bottom: 1px solid #f0f0f0;
    }
    td { padding: 12px 14px; border-bottom: 1px solid #f8f8f8; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdfcfb; }
    .badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .badge.green { background: #22c55e; }
    .badge.gray { background: #ddd; }

    /* Survey cards */
    .survey-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .card h3 { font-size: 13px; color: #888; font-weight: 500; margin-bottom: 14px; }
    .dist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .dist-label { font-size: 12px; color: #555; min-width: 140px; text-align: right; }
    .dist-bar {
      flex: 1; height: 22px; background: #f5f5f5; border-radius: 6px; overflow: hidden;
    }
    .dist-fill {
      height: 100%; border-radius: 6px; display: flex; align-items: center;
      padding-left: 8px; font-size: 11px; color: #fff; font-weight: 500;
      min-width: 24px;
    }
    .feedback-list { max-height: 300px; overflow-y: auto; }
    .feedback-item {
      padding: 10px 0; border-bottom: 1px solid #f5f5f5;
      font-size: 13px; line-height: 1.6; color: #333;
    }
    .feedback-item:last-child { border-bottom: none; }

    /* Email section */
    .email-preview {
      background: #fafafa; border: 1px solid #eee; border-radius: 8px;
      padding: 20px; font-size: 13px; line-height: 1.8;
      white-space: pre-wrap; color: #333;
      max-height: 400px; overflow-y: auto; display: none;
      margin-top: 16px;
    }
    .btn {
      padding: 8px 18px; border: none; border-radius: 6px;
      font-family: inherit; font-size: 13px; cursor: pointer; font-weight: 500;
    }
    .btn-primary { background: #f05a28; color: #fff; }
    .btn-primary:hover { background: #d94d20; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #2d3a4a; border: 1px solid #2d3a4a; }
    .btn-outline:hover { background: #f5f5f5; }

    .result-msg {
      margin-top: 12px; padding: 12px 16px; border-radius: 6px;
      font-size: 13px; display: none;
    }
    .result-msg.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .result-msg.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .loading { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }

    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: 1fr; }
      .survey-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <!-- Gate -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <h2>Admin</h2>
      <p>Above Coding Club 관리자 전용</p>
      <input type="password" class="gate-input" id="passwordInput" placeholder="비밀번호 입력" autocomplete="off">
      <button class="gate-btn" id="loginBtn">입장</button>
      <div class="gate-error" id="gateError">비밀번호가 올바르지 않습니다.</div>
    </div>
  </div>

  <!-- Main -->
  <div class="page-wrapper" id="main" style="display:none;">
    <header>
      <div class="header-left">
        <div class="header-title">
          Above Coding Club
          <small>관리자</small>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="applicants">신청 관리</button>
      <button class="tab" data-tab="surveys">후기 서베이</button>
      <button class="tab" data-tab="email">메일 보내기</button>
    </div>

    <!-- Tab 1: 신청 관리 -->
    <div class="tab-content active" id="tab-applicants">
      <div class="controls">
        <label>워크샵 선택</label>
        <select id="workshopSelect"><option value="">불러오는 중...</option></select>
      </div>
      <div class="stats-grid" id="appStats"></div>
      <div class="table-wrap">
        <div class="search-bar">
          <input type="text" class="search-input" id="appSearch" placeholder="이름 또는 직군으로 검색...">
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>이름</th><th>하시는 일</th><th>연락처</th>
                <th>이메일</th><th>입금</th><th>맥북</th><th>신청일</th>
              </tr>
            </thead>
            <tbody id="appTable"><tr><td colspan="7" class="loading">워크샵을 선택해주세요</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab 2: 후기 서베이 -->
    <div class="tab-content" id="tab-surveys">
      <div class="controls">
        <label>워크샵 선택</label>
        <select id="surveySelect"><option value="">불러오는 중...</option></select>
      </div>
      <div class="stats-grid" id="surveyStats"></div>
      <div class="survey-grid" id="surveyCharts"></div>
      <div id="surveyFeedback"></div>
    </div>

    <!-- Tab 3: 메일 보내기 -->
    <div class="tab-content" id="tab-email">
      <div class="controls">
        <label>워크샵 선택</label>
        <select id="emailWorkshopSelect"><option value="">불러오는 중...</option></select>
        <label>워크샵 날짜</label>
        <input type="date" id="emailDate">
        <button class="btn btn-outline" id="previewBtn">미리보기</button>
        <button class="btn btn-primary" id="sendBtn" disabled>전체 발송</button>
      </div>
      <div class="email-preview" id="emailPreview"></div>
      <div class="result-msg" id="emailResult"></div>
    </div>
  </div>

  <script>
    const API = '/api/admin';
    let password = sessionStorage.getItem('admin_pw') || '';
    let workshops = [];
    let sessions = [];
    let currentApplicants = [];

    // --- Gate ---
    const gate = document.getElementById('gate');
    const mainEl = document.getElementById('main');

    if (password) init();

    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    async function tryLogin() {
      password = document.getElementById('passwordInput').value.trim();
      if (!password) return;
      document.getElementById('gateError').style.display = 'none';

      const ok = await init();
      if (ok) {
        sessionStorage.setItem('admin_pw', password);
      } else {
        document.getElementById('gateError').style.display = 'block';
        password = '';
        sessionStorage.removeItem('admin_pw');
      }
    }

    async function init() {
      try {
        const res = await fetch(`${API}?password=${encodeURIComponent(password)}&action=tables`);
        if (res.status === 401) return false;
        if (!res.ok) return false;

        const data = await res.json();
        workshops = data.workshops || [];
        sessions = data.sessions || [];

        gate.classList.add('hidden');
        mainEl.style.display = 'block';

        populateSelects();
        if (workshops.length > 0) {
          document.getElementById('workshopSelect').value = workshops[0].id;
          loadApplicants(workshops[0].id);
        }
        return true;
      } catch (e) {
        console.error(e);
        return false;
      }
    }

    function populateSelects() {
      const opts = workshops.map(w => `<option value="${w.id}">${w.dateLabel}</option>`).join('');
      document.getElementById('workshopSelect').innerHTML = opts || '<option>워크샵 없음</option>';
      document.getElementById('emailWorkshopSelect').innerHTML = opts || '<option>워크샵 없음</option>';

      const sOpts = sessions.map(s => `<option value="${s}">${s}</option>`).join('');
      document.getElementById('surveySelect').innerHTML = sOpts || '<option>서베이 없음</option>';
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // --- Tab 1: Applicants ---
    document.getElementById('workshopSelect').addEventListener('change', e => loadApplicants(e.target.value));

    async function loadApplicants(tableId) {
      if (!tableId) return;
      document.getElementById('appTable').innerHTML = '<tr><td colspan="7" class="loading">불러오는 중...</td></tr>';

      const res = await fetch(`${API}?password=${encodeURIComponent(password)}&action=applicants&tableId=${tableId}`);
      const data = await res.json();

      currentApplicants = data.participants || [];
      renderAppStats(data.stats);
      renderAppTable(currentApplicants);
    }

    function renderAppStats(s) {
      if (!s) return;
      const paidPct = s.total ? Math.round((s.paid / s.total) * 100) : 0;
      const macPct = s.total ? Math.round((s.macbook / s.total) * 100) : 0;
      document.getElementById('appStats').innerHTML = `
        <div class="stat-card"><div class="stat-label">총 신청</div><div class="stat-value">${s.total}</div><div class="stat-sub">명</div></div>
        <div class="stat-card"><div class="stat-label">입금 완료</div><div class="stat-value">${s.paid}</div><div class="stat-sub">${paidPct}%</div></div>
        <div class="stat-card"><div class="stat-label">맥북 확인</div><div class="stat-value">${s.macbook}</div><div class="stat-sub">${macPct}%</div></div>
      `;
    }

    function renderAppTable(list) {
      if (!list.length) {
        document.getElementById('appTable').innerHTML = '<tr><td colspan="7" class="empty">신청자가 없습니다</td></tr>';
        return;
      }
      document.getElementById('appTable').innerHTML = list.map(p => {
        const d = p.signupDate ? new Date(p.signupDate).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) : '-';
        return `<tr>
          <td><strong>${esc(p.name)}</strong></td><td>${esc(p.job)}</td>
          <td>${esc(p.phone)}</td><td>${esc(p.email)}</td>
          <td><span class="badge ${p.paid ? 'green' : 'gray'}"></span></td>
          <td><span class="badge ${p.macbook ? 'green' : 'gray'}"></span></td>
          <td style="color:#888">${d}</td>
        </tr>`;
      }).join('');
    }

    document.getElementById('appSearch').addEventListener('input', e => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) { renderAppTable(currentApplicants); return; }
      renderAppTable(currentApplicants.filter(p =>
        p.name.toLowerCase().includes(q) || p.job.toLowerCase().includes(q)
      ));
    });

    // --- Tab 2: Surveys ---
    document.getElementById('surveySelect').addEventListener('change', e => loadSurveys(e.target.value));

    // 첫 서베이 자동 로딩
    setTimeout(() => {
      if (sessions.length > 0) {
        document.getElementById('surveySelect').value = sessions[0];
        loadSurveys(sessions[0]);
      }
    }, 500);

    async function loadSurveys(sessionId) {
      document.getElementById('surveyStats').innerHTML = '<div class="loading">불러오는 중...</div>';
      document.getElementById('surveyCharts').innerHTML = '';
      document.getElementById('surveyFeedback').innerHTML = '';

      const url = `${API}?password=${encodeURIComponent(password)}&action=surveys${sessionId ? `&sessionId=${encodeURIComponent(sessionId)}` : ''}`;
      const res = await fetch(url);
      const data = await res.json();

      renderSurveyStats(data.stats);
      renderSurveyCharts(data.difficultyDist, data.reJoinDist);
      renderSurveyFeedback(data.surveys);
    }

    function renderSurveyStats(s) {
      document.getElementById('surveyStats').innerHTML = `
        <div class="stat-card"><div class="stat-label">응답 수</div><div class="stat-value">${s.count}</div></div>
        <div class="stat-card"><div class="stat-label">평균 만족도</div><div class="stat-value">${s.avgSatisfaction}</div><div class="stat-sub">/ 5점</div></div>
        <div class="stat-card"><div class="stat-label">평균 NPS</div><div class="stat-value">${s.avgNps}</div><div class="stat-sub">/ 10점</div></div>
      `;
    }

    function renderSurveyCharts(diff, reJoin) {
      const colors = ['#f05a28', '#f5a623', '#4a90d9', '#2d3a4a', '#7c3aed'];
      const total = (obj) => Object.values(obj).reduce((a, b) => a + b, 0);

      const renderDist = (title, dist) => {
        const t = total(dist);
        if (!t) return `<div class="card"><h3>${title}</h3><div class="empty">데이터 없음</div></div>`;
        return `<div class="card"><h3>${title}</h3>
          ${Object.entries(dist).map(([k, v], i) => {
            const pct = Math.round((v / t) * 100);
            return `<div class="dist-item">
              <div class="dist-label">${esc(k)}</div>
              <div class="dist-bar"><div class="dist-fill" style="width:${Math.max(pct, 12)}%;background:${colors[i % colors.length]}">${v}</div></div>
            </div>`;
          }).join('')}
        </div>`;
      };

      document.getElementById('surveyCharts').innerHTML =
        renderDist('난이도 체감', diff) + renderDist('재참여 의향', reJoin);
    }

    function renderSurveyFeedback(surveys) {
      const goods = surveys.filter(s => s.bestPart.trim()).map(s => s.bestPart.trim());
      const improves = surveys.filter(s => s.improvement.trim()).map(s => s.improvement.trim());

      document.getElementById('surveyFeedback').innerHTML = `
        <div class="survey-grid">
          <div class="card">
            <h3>가장 좋았던 점</h3>
            <div class="feedback-list">
              ${goods.length ? goods.map(g => `<div class="feedback-item">${esc(g)}</div>`).join('') : '<div class="empty">응답 없음</div>'}
            </div>
          </div>
          <div class="card">
            <h3>개선할 점</h3>
            <div class="feedback-list">
              ${improves.length ? improves.map(g => `<div class="feedback-item">${esc(g)}</div>`).join('') : '<div class="empty">응답 없음</div>'}
            </div>
          </div>
        </div>
      `;
    }

    // --- Tab 3: Email ---
    const previewBtn = document.getElementById('previewBtn');
    const sendBtn = document.getElementById('sendBtn');
    const emailPreview = document.getElementById('emailPreview');
    const emailResult = document.getElementById('emailResult');

    previewBtn.addEventListener('click', async () => {
      const tableId = document.getElementById('emailWorkshopSelect').value;
      const dateVal = document.getElementById('emailDate').value;
      if (!tableId) { alert('워크샵을 선택해주세요.'); return; }
      if (!dateVal) { alert('워크샵 날짜를 선택해주세요.'); return; }

      // 해당 워크샵 신청자 로딩
      const res = await fetch(`${API}?password=${encodeURIComponent(password)}&action=applicants&tableId=${tableId}`);
      const data = await res.json();
      const participants = data.participants || [];

      const date = new Date(dateVal + 'T00:00:00');
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const dayOfWeek = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
      const d1 = new Date(date); d1.setDate(d1.getDate() - 1);
      const d2 = new Date(date); d2.setDate(d2.getDate() - 2);
      const fmt = (d) => `${d.getMonth() + 1}/${d.getDate()}`;

      const jobs = [...new Set(participants.map(p => p.job).filter(Boolean))].join(', ');
      const tools = participants.filter(p => p.tool && p.tool.trim()).map(p => `• ${p.tool.trim()}`).join('\n');

      emailPreview.textContent = `[발송 대상: ${participants.length}명]\n\n` +
`안녕하세요, 어보브 코딩 클럽 워크샵을 신청해 주셔서 감사합니다.
${month}월 ${day}일 워크샵에 대해 안내드릴게요.

■ 일시
${year}년 ${month}월 ${day}일 (${dayOfWeek}) 오후 2시 - 6시

■ 장소
서촌 AULA 스페이스

■ 함께하는 분들
${jobs}

■ 만들고 싶은 도구
${tools || '(아직 적어주신 분이 없어요)'}

■ 환불 안내
2일 전(${fmt(d2)})까지 전액 환불 / 1일 전(${fmt(d1)}) 반액 환불

${month}월 ${day}일에 만나요!
어보브 코딩 클럽 드림`;

      emailPreview.style.display = 'block';
      sendBtn.disabled = false;
      emailResult.style.display = 'none';
    });

    sendBtn.addEventListener('click', async () => {
      const tableId = document.getElementById('emailWorkshopSelect').value;
      const dateVal = document.getElementById('emailDate').value;
      if (!tableId || !dateVal) return;

      if (!confirm('상세 안내 이메일을 전체 발송합니다.\n계속할까요?')) return;

      sendBtn.disabled = true;
      sendBtn.textContent = '발송 중...';
      emailResult.style.display = 'none';

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${password}`
          },
          body: JSON.stringify({ action: 'send-info', tableId, workshopDate: dateVal })
        });

        const data = await res.json();
        emailResult.className = res.ok ? 'result-msg success' : 'result-msg error';
        emailResult.textContent = res.ok ? `✓ ${data.message}` : `✗ ${data.error || '발송 실패'}`;
        emailResult.style.display = 'block';
      } catch (err) {
        emailResult.className = 'result-msg error';
        emailResult.textContent = `✗ 네트워크 오류: ${err.message}`;
        emailResult.style.display = 'block';
      }

      sendBtn.disabled = false;
      sendBtn.textContent = '전체 발송';
    });

    // --- Util ---
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
